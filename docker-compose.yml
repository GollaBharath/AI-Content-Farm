services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aicf-api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      STORAGE_DIR: "/srv/data"
      TTS_BASE_URL: "http://tts:10200"
      TTS_SYNTH_PATH: "/api/tts"
      TTS_TIMEOUT_SECONDS: "30"
      TRENDS_REGION: "US"
      FFMPEG_BIN: "ffmpeg"
    volumes:
      - ./data:/srv/data
    depends_on:
      - tts

  tts:
    image: ghcr.io/rhasspy/piper:latest
    container_name: aicf-tts
    ports:
      - "9000:10200"
    command: ["--http-port", "10200", "--voice", "en_US-lessac-medium"]
