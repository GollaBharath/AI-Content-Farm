services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aicf-api
    env_file: ".env"
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./data:/srv/data
      - ./videos:/srv/videos
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${PORT}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  tts:
    build:
      context: ./piper
      dockerfile: Dockerfile
    container_name: aicf-tts
    ports:
      - "${TTS_PORT}:5002"
    environment:
      PIPER_VOICE: "${PIPER_VOICE:-}"
      PIPER_LANGUAGE: "${PIPER_LANGUAGE:-}"
      PIPER_QUALITY: "${PIPER_QUALITY:-}"
      PIPER_MODEL_DIR: "/models"
    volumes:
      - piper_models:/models
    restart: unless-stopped

volumes:
  piper_models:
